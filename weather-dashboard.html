<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #48bb78;
            --warning: #f6ad55;
            --danger: #f56565;
            --dark: #2d3748;
            --light: #f7fafc;
            --text: #2d3748;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-section {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 15px;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .search-wrapper {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 10;
        }

        .suggestions.active {
            display: block;
        }

        .suggestion-item {
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s ease;
            border-bottom: 1px solid var(--border);
        }

        .suggestion-item:hover,
        .suggestion-item.selected {
            background: var(--light);
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-search {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-location {
            background: var(--success);
            color: white;
        }

        .btn-location:hover {
            background: #38a169;
        }

        .btn-unit {
            background: var(--warning);
            color: white;
        }

        .btn-unit:hover {
            background: #ed8936;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
        }

        .current-weather {
            grid-column: 1 / -1;
        }

        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        .location-info h2 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .location-info p {
            color: #718096;
            font-size: 0.95em;
        }

        .weather-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
        }

        .temperature {
            font-size: 3.5em;
            font-weight: 700;
            color: var(--primary);
            margin: 15px 0;
        }

        .description {
            font-size: 1.2em;
            color: #718096;
            text-transform: capitalize;
            margin-bottom: 15px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .detail-item {
            background: var(--light);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .detail-label {
            font-size: 0.85em;
            color: #718096;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .detail-value {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--primary);
        }

        .forecast-container {
            grid-column: 1 / -1;
        }

        .forecast-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            font-weight: 700;
            color: var(--text);
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .forecast-card {
            background: linear-gradient(135deg, var(--light) 0%, white 100%);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .forecast-card:hover {
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .forecast-date {
            font-size: 0.9em;
            color: #718096;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .forecast-icon {
            font-size: 2.5em;
            margin: 10px 0;
        }

        .forecast-temp {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--primary);
        }

        .forecast-range {
            font-size: 0.85em;
            color: #718096;
            margin-top: 8px;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: white;
            border-left: 4px solid var(--danger);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .error-title {
            font-weight: 700;
            color: var(--danger);
            margin-bottom: 5px;
        }

        .error-message {
            color: #718096;
        }

        .error-details {
            font-size: 0.9em;
            color: #a0aec0;
            margin-top: 10px;
        }

        .placeholder {
            background: white;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            color: #718096;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .placeholder-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .search-section {
                grid-template-columns: 1fr;
            }

            .controls {
                width: 100%;
            }

            .btn {
                flex: 1;
                justify-content: center;
            }

            .main-grid {
                grid-template-columns: 1fr;
            }

            .weather-details {
                grid-template-columns: repeat(2, 1fr);
            }

            .forecast-grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p>Real-time weather information at your fingertips</p>
        </div>

        <div class="search-section">
            <div class="search-wrapper">
                <input
                    type="text"
                    class="search-input"
                    id="citySearch"
                    placeholder="Enter city name... (e.g., London, New York)"
                    autocomplete="off"
                    aria-label="Search for a city"
                />
                <div class="suggestions" id="suggestions"></div>
            </div>
            <button class="btn btn-search" id="searchBtn">
                🔍 Search
            </button>
            <div class="controls">
                <button class="btn btn-location" id="locationBtn">
                    📍 My Location
                </button>
                <button class="btn btn-unit" id="unitBtn">
                    °C / °F
                </button>
            </div>
        </div>

        <div id="content">
            <div class="placeholder">
                <div class="placeholder-icon">🌍</div>
                <p>Search for a city to get started</p>
                <small style="display: block; margin-top: 10px;">
                    Try: London, New York, Tokyo, or use your current location
                </small>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // WEATHER DASHBOARD APPLICATION
        // Async/Await, Fetch API, Error Handling
        // ============================================

        class WeatherDashboard {
            constructor() {
                // Configuration
                this.apiKey = '0fd79eba1a6f1c00c68dd8d1e62e4359'; // Free tier API key
                this.baseUrl = 'https://api.openweathermap.org/data/2.5';
                this.geoUrl = 'https://api.openweathermap.org/geo/1.0';

                // DOM Elements
                this.citySearch = document.getElementById('citySearch');
                this.searchBtn = document.getElementById('searchBtn');
                this.locationBtn = document.getElementById('locationBtn');
                this.unitBtn = document.getElementById('unitBtn');
                this.content = document.getElementById('content');
                this.suggestions = document.getElementById('suggestions');

                // Application State
                this.currentCity = null;
                this.currentWeather = null;
                this.forecast = null;
                this.unit = 'metric'; // 'metric' for Celsius, 'imperial' for Fahrenheit
                this.searchTimeout = null;
                this.abortController = null;

                // Initialize
                this.init();
            }

            // ========== INITIALIZATION ==========
            init() {
                this.attachEventListeners();
                this.loadDefaultLocation();
            }

            attachEventListeners() {
                // Search functionality
                this.searchBtn.addEventListener('click', () => this.handleSearch());
                this.citySearch.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.handleSearch();
                });

                // Search with debouncing for suggestions
                this.citySearch.addEventListener('input', (e) => {
                    this.handleSearchInput(e.target.value);
                });

                // Location button
                this.locationBtn.addEventListener('click', () => this.getLocationWeather());

                // Unit toggle
                this.unitBtn.addEventListener('click', () => this.toggleUnit());

                // Close suggestions when clicking outside
                document.addEventListener('click', (e) => {
                    if (e.target !== this.citySearch) {
                        this.closeSuggestions();
                    }
                });
            }

            loadDefaultLocation() {
                const savedCity = localStorage.getItem('lastCity');
                if (savedCity) {
                    this.citySearch.value = savedCity;
                    this.handleSearch();
                }
            }

            // ========== SEARCH FUNCTIONALITY ==========
            async handleSearch() {
                const city = this.citySearch.value.trim();
                if (!city) return;

                this.closeSuggestions();
                await this.fetchWeatherByCity(city);
                localStorage.setItem('lastCity', city);
            }

            async handleSearchInput(value) {
                clearTimeout(this.searchTimeout);

                if (!value.trim()) {
                    this.closeSuggestions();
                    return;
                }

                // Debounce the autocomplete request
                this.searchTimeout = setTimeout(async () => {
                    try {
                        const suggestions = await this.fetchCitySuggestions(value);
                        this.displaySuggestions(suggestions);
                    } catch (error) {
                        console.error('Error fetching suggestions:', error);
                        this.closeSuggestions();
                    }
                }, 300);
            }

            async fetchCitySuggestions(query) {
                try {
                    const response = await fetch(
                        `${this.geoUrl}/direct?q=${encodeURIComponent(query)}&limit=5&appid=${this.apiKey}`,
                        { signal: AbortSignal.timeout(5000) }
                    );

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    return data;
                } catch (error) {
                    throw new Error(`Failed to fetch suggestions: ${error.message}`);
                }
            }

            displaySuggestions(suggestions) {
                if (!suggestions || suggestions.length === 0) {
                    this.closeSuggestions();
                    return;
                }

                this.suggestions.innerHTML = suggestions.map((city, index) => {
                    const displayName = `${city.name}${city.state ? ', ' + city.state : ''}, ${city.country}`;
                    return `
                        <div class="suggestion-item" data-index="${index}" data-city="${city.name}" data-lat="${city.lat}" data-lon="${city.lon}">
                            📍 ${this.escapeHtml(displayName)}
                        </div>
                    `;
                }).join('');

                this.suggestions.classList.add('active');

                // Attach click handlers to suggestion items
                this.suggestions.querySelectorAll('.suggestion-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        this.citySearch.value = e.target.dataset.city;
                        this.closeSuggestions();
                        this.handleSearch();
                    });
                });
            }

            closeSuggestions() {
                this.suggestions.classList.remove('active');
                this.suggestions.innerHTML = '';
            }

            // ========== WEATHER API CALLS ==========
            async fetchWeatherByCity(city) {
                try {
                    this.showLoading();

                    // Cancel previous request if any
                    if (this.abortController) {
                        this.abortController.abort();
                    }
                    this.abortController = new AbortController();

                    // Fetch current weather
                    const weatherResponse = await fetch(
                        `${this.baseUrl}/weather?q=${encodeURIComponent(city)}&units=${this.unit}&appid=${this.apiKey}`,
                        { signal: this.abortController.signal }
                    );

                    if (!weatherResponse.ok) {
                        if (weatherResponse.status === 404) {
                            throw new Error(`City "${city}" not found. Please try another search.`);
                        } else if (weatherResponse.status === 401) {
                            throw new Error('API key is invalid');
                        } else {
                            throw new Error(`HTTP error! status: ${weatherResponse.status}`);
                        }
                    }

                    this.currentWeather = await weatherResponse.json();
                    this.currentCity = city;

                    // Fetch forecast in parallel
                    const forecastResponse = await fetch(
                        `${this.baseUrl}/forecast?q=${encodeURIComponent(city)}&units=${this.unit}&appid=${this.apiKey}`,
                        { signal: this.abortController.signal }
                    );

                    if (!forecastResponse.ok) {
                        throw new Error(`Forecast error: ${forecastResponse.status}`);
                    }

                    this.forecast = await forecastResponse.json();

                    // Render the dashboard
                    this.render();
                } catch (error) {
                    if (error.name === 'AbortError') {
                        console.log('Request was cancelled');
                        return;
                    }
                    this.showError(error);
                }
            }

            async getLocationWeather() {
                try {
                    this.showLoading();
                    this.locationBtn.disabled = true;

                    // Get user's coordinates
                    const coords = await this.getCoordinates();

                    // Fetch weather using coordinates
                    const response = await fetch(
                        `${this.baseUrl}/weather?lat=${coords.latitude}&lon=${coords.longitude}&units=${this.unit}&appid=${this.apiKey}`,
                        { signal: AbortSignal.timeout(10000) }
                    );

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    this.currentWeather = await response.json();
                    this.citySearch.value = this.currentWeather.name;

                    // Fetch forecast
                    const forecastResponse = await fetch(
                        `${this.baseUrl}/forecast?lat=${coords.latitude}&lon=${coords.longitude}&units=${this.unit}&appid=${this.apiKey}`,
                        { signal: AbortSignal.timeout(10000) }
                    );

                    if (!forecastResponse.ok) {
                        throw new Error(`Forecast error: ${forecastResponse.status}`);
                    }

                    this.forecast = await forecastResponse.json();

                    this.render();
                } catch (error) {
                    if (error.message.includes('denied')) {
                        this.showError(new Error('Location access denied. Please enable location permissions.'));
                    } else {
                        this.showError(error);
                    }
                } finally {
                    this.locationBtn.disabled = false;
                }
            }

            getCoordinates() {
                return new Promise((resolve, reject) => {
                    if (!navigator.geolocation) {
                        reject(new Error('Geolocation is not supported by your browser.'));
                        return;
                    }

                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            resolve({
                                latitude: position.coords.latitude,
                                longitude: position.coords.longitude
                            });
                        },
                        (error) => {
                            reject(new Error(`Geolocation error: ${error.message}`));
                        },
                        { timeout: 10000 }
                    );
                });
            }

            // ========== UNIT CONVERSION ==========
            toggleUnit() {
                this.unit = this.unit === 'metric' ? 'imperial' : 'metric';
                this.unitBtn.textContent = this.unit === 'metric' ? '°C / °F' : '°F / °C';

                if (this.currentWeather) {
                    this.handleSearch();
                }
            }

            getUnitSymbol() {
                return this.unit === 'metric' ? '°C' : '°F';
            }

            getSpeedUnit() {
                return this.unit === 'metric' ? 'm/s' : 'mph';
            }

            // ========== RENDERING ==========
            render() {
                try {
                    if (!this.currentWeather || !this.forecast) {
                        throw new Error('Weather data is not available');
                    }

                    const html = `
                        <div class="current-weather card">
                            ${this.renderCurrentWeather()}
                        </div>
                        <div class="card">
                            ${this.renderWeatherDetails()}
                        </div>
                        <div class="card">
                            ${this.renderAdditionalInfo()}
                        </div>
                        <div class="forecast-container card">
                            ${this.renderForecast()}
                        </div>
                    `;

                    this.content.innerHTML = html;
                } catch (error) {
                    this.showError(error);
                }
            }

            renderCurrentWeather() {
                const weather = this.currentWeather;
                const iconCode = weather.weather[0].icon;
                const icon = this.getWeatherIcon(iconCode);

                return `
                    <div class="weather-header">
                        <div class="location-info">
                            <h2>${this.escapeHtml(weather.name)}, ${weather.sys.country}</h2>
                            <p>${new Date().toLocaleDateString('en-US', { 
                                weekday: 'long', 
                                year: 'numeric', 
                                month: 'long', 
                                day: 'numeric' 
                            })}</p>
                        </div>
                        <div class="weather-icon">${icon}</div>
                    </div>
                    <div class="temperature">${Math.round(weather.main.temp)}${this.getUnitSymbol()}</div>
                    <div class="description">${weather.weather[0].description}</div>
                    <p style="color: #718096; margin-bottom: 15px;">
                        Feels like ${Math.round(weather.main.feels_like)}${this.getUnitSymbol()}
                    </p>
                `;
            }

            renderWeatherDetails() {
                const weather = this.currentWeather;

                return `
                    <div class="weather-details">
                        <div class="detail-item">
                            <div class="detail-label">💧 Humidity</div>
                            <div class="detail-value">${weather.main.humidity}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">💨 Wind Speed</div>
                            <div class="detail-value">${Math.round(weather.wind.speed)}</div>
                            <small style="color: #a0aec0;">${this.getSpeedUnit()}</small>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">🔽 Pressure</div>
                            <div class="detail-value">${weather.main.pressure}</div>
                            <small style="color: #a0aec0;">mb</small>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">👁️ Visibility</div>
                            <div class="detail-value">${(weather.visibility / 1000).toFixed(1)}</div>
                            <small style="color: #a0aec0;">km</small>
                        </div>
                    </div>
                `;
            }

            renderAdditionalInfo() {
                const weather = this.currentWeather;
                const sunrise = new Date(weather.sys.sunrise * 1000).toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
                const sunset = new Date(weather.sys.sunset * 1000).toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit'
                });

                return `
                    <h3 style="margin-bottom: 15px; color: var(--text);">Additional Information</h3>
                    <div class="weather-details">
                        <div class="detail-item">
                            <div class="detail-label">🌅 Sunrise</div>
                            <div class="detail-value" style="font-size: 1.2em;">${sunrise}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">🌇 Sunset</div>
                            <div class="detail-value" style="font-size: 1.2em;">${sunset}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">☁️ Cloudiness</div>
                            <div class="detail-value">${weather.clouds.all}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">💧 Dew Point</div>
                            <div class="detail-value">${Math.round(weather.main.temp - ((100 - weather.main.humidity) / 5))}${this.getUnitSymbol()}</div>
                        </div>
                    </div>
                `;
            }

            renderForecast() {
                try {
                    // Process forecast data (get one entry per day)
                    const dailyForecasts = this.processForecast(this.forecast.list);

                    const forecastHtml = dailyForecasts.map(day => {
                        const icon = this.getWeatherIcon(day.icon);
                        const date = new Date(day.dt * 1000).toLocaleDateString('en-US', {
                            month: 'short',
                            day: 'numeric'
                        });
                        const dayName = new Date(day.dt * 1000).toLocaleDateString('en-US', {
                            weekday: 'short'
                        });

                        return `
                            <div class="forecast-card">
                                <div class="forecast-date">${dayName} ${date}</div>
                                <div class="forecast-icon">${icon}</div>
                                <div class="forecast-temp">${Math.round(day.main.temp)}${this.getUnitSymbol()}</div>
                                <div class="forecast-range">
                                    ${Math.round(day.main.temp_min)}° / ${Math.round(day.main.temp_max)}°
                                </div>
                                <small style="color: #a0aec0; display: block; margin-top: 8px;">
                                    💧 ${day.main.humidity}%
                                </small>
                            </div>
                        `;
                    }).join('');

                    return `
                        <div class="forecast-title">5-Day Forecast</div>
                        <div class="forecast-grid">
                            ${forecastHtml}
                        </div>
                    `;
                } catch (error) {
                    return '<p style="color: var(--danger);">Unable to load forecast data</p>';
                }
            }

            processForecast(forecastList) {
                const dailyData = {};

                forecastList.forEach(item => {
                    const date = new Date(item.dt * 1000).toDateString();

                    if (!dailyData[date]) {
                        dailyData[date] = {
                            dt: item.dt,
                            icon: item.weather[0].icon,
                            main: {
                                temp: item.main.temp,
                                temp_min: item.main.temp_min,
                                temp_max: item.main.temp_max,
                                humidity: item.main.humidity
                            }
                        };
                    } else {
                        // Update min/max temperatures
                        dailyData[date].main.temp_min = Math.min(
                            dailyData[date].main.temp_min,
                            item.main.temp_min
                        );
                        dailyData[date].main.temp_max = Math.max(
                            dailyData[date].main.temp_max,
                            item.main.temp_max
                        );
                    }
                });

                return Object.values(dailyData).slice(0, 5);
            }

            getWeatherIcon(iconCode) {
                const iconMap = {
                    '01d': '☀️', '01n': '🌙',
                    '02d': '🌤️', '02n': '🌤️',
                    '03d': '☁️', '03n': '☁️',
                    '04d': '☁️', '04n': '☁️',
                    '09d': '🌧️', '09n': '🌧️',
                    '10d': '🌦️', '10n': '🌧️',
                    '11d': '⛈️', '11n': '⛈️',
                    '13d': '❄️', '13n': '❄️',
                    '50d': '🌫️', '50n': '🌫️'
                };
                return iconMap[iconCode] || '🌤️';
            }

            // ========== UI STATE MANAGEMENT ==========
            showLoading() {
                this.content.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Fetching weather data...</p>
                    </div>
                `;
            }

            showError(error) {
                console.error('Error:', error);

                const errorMessage = error.message || 'An unknown error occurred';

                this.content.innerHTML = `
                    <div class="error">
                        <div class="error-title">⚠️ Error Loading Weather</div>
                        <div class="error-message">${this.escapeHtml(errorMessage)}</div>
                        <div class="error-details">
                            Please try a different search or check your internet connection.
                        </div>
                    </div>
                    <div class="placeholder">
                        <div class="placeholder-icon">🌍</div>
                        <p>Search for a city to get started</p>
                    </div>
                `;
            }

            // ========== UTILITY ==========
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // ========== APPLICATION START ==========
        document.addEventListener('DOMContentLoaded', () => {
            new WeatherDashboard();
        });
    </script>
</body>
</html>
